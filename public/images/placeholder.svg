<svg width="500" height="500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="500" fill="url(#grad1)" opacity="0.2"/>
  
  <!-- Circle -->
  <circle cx="250" cy="200" r="80" fill="url(#grad1)" opacity="0.3"/>
  
  <!-- Body -->
  <ellipse cx="250" cy="350" rx="120" ry="100" fill="url(#grad1)" opacity="0.3"/>
  
  <!-- Text -->
  <text x="250" y="450" font-family="Arial, sans-serif" font-size="24" fill="#00f0ff" text-anchor="middle" font-weight="bold">
    Add Your Photo Here
  </text>
  <text x="250" cy="480" font-family="Arial, sans-serif" font-size="16" fill="#a855f7" text-anchor="middle">
    profile.jpg or profile.png
  </text>
</svg>
